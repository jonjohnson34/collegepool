<div class="col-sm-6">
<table class="table table-condensed">
    <thead>
        <tr>
            <th><h5>Visitor Score</h5></th>
            <th><h5>Visitor Team</h5></th>
            <th><h5>Home Team</h5></th>
            <th><h5>Home Score</h5></th>
            <th><h5>Covered</h5></th>
        </tr>
    </thead>
    <tbody>
        <tr ng-repeat="score in ScoreCtrl.scores">
            <td><h6> {{score.AwayScore}}</h6></td>
            <td><h6> {{score.AwayTeam}}</h6></td>
            <td><h6> {{score.HomeTeam}}</h6></td>
            <td><h6> {{score.HomeScore}}</h6></td>
            <td><h6> {{score.Covered}}</h6></td>
        </tr>
    </tbody>
</table>
</div>
