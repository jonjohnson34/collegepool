<div class="container text-center">
  <div class="row">

    <toolbar class="primary tall" layout="column" layout-align="end" layout-fill>
      <div layout="row" class="toolbar-tools toolbar-tools-bottom">
        <h3> Reset Password </h3>
      </div>
    </toolbar>

    <div class="row">
      <p>Enter your email so we can send you a reset link</p>
    </div>

    <form name="resetForm">
      <div class="form-group">
        <label>Email</label>
        <input type="text" class="form-control" ng-model="rpc.credentials.email" placeholder="email" />
      </div>
      <div layout="row" layout-align="center">
        <button class="button button-primary" ng-click="rpc.reset()">Send Email</button>
      </div>
    </form>

    <toolbar ng-show="rpc.error">
      <p class="md-body-1">{{ resetpw.error }}</p>
    </toolbar>


    <div layout="row" layout-align="center">
      <a class="md-button" href="/login">Sign in</a>
    </div>

  </div>

</div>
