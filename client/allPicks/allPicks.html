<md-card class="md-card" layout="row" layout-margin ng-repeat="pick in allPicks.picks">
    <md-card-header>
        <div flex>
            Picks for {{pick.week}}
        </div>
    </md-card-header>
    <md-card-content>
        <li> {{pick.gotw}} </li>
        <li> {{pick.gameTwo}} </li>
        <li> {{pick.gameThree}} </li>
        <li> {{pick.gameFour}} </li>
        <li> {{pick.gameFive}} </li>
        <li> {{pick.gameSix}} </li>
        <li> {{pick.gameSeven}} </li>
        <li> {{pick.gameEight}} </li>
        <li> {{pick.gameNine}} </li>
        <li> {{pick.gameTen}} </li>
    </md-card-content>
</md-card>
